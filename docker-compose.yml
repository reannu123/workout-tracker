# Workout Tracker — full local stack. Usage:
#   cp .env.example .env && docker compose up --build
# Then open http://localhost:8080
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workout_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-workout}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workout} -d ${POSTGRES_DB:-workout}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://workout:workout_dev_password@postgres:5432/workout?schema=public}
      SERVER_PORT: ${SERVER_PORT:-4000}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${SERVER_PORT:-4000}:4000"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  pgdata:

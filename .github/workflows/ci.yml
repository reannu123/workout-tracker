name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: server
        run: npm install --no-audit --no-fund
      - working-directory: server
        run: npm test

  client-build:
    name: Client typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: client
        run: npm install --no-audit --no-fund
      - working-directory: client
        run: npm run build

  compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        run: |
          cp .env.example .env
          docker compose config --quiet
          POSTGRES_PASSWORD=dummy docker compose -f compose.deploy.yaml config --quiet
          echo "compose OK"

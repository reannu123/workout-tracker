services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: workout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: workout
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workout -d workout"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: ghcr.io/reannu123/workout-tracker-server:${IMAGE_TAG:-main}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://workout:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/workout?schema=public
      SERVER_PORT: 4000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-https://workout.reannu.dev}
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  client:
    image: ghcr.io/reannu123/workout-tracker-client:${IMAGE_TAG:-main}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3025}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
